<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ProdStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2ab7a7;
            --primary-hover: #249d8f;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --background-light: #f0fafa;
            --background-page: #f9feff;
            --border-color: #e5e7eb;
            --input-bg: #f9fafb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--background-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1100px;
            background-color: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            position: relative;
        }

        .left-panel {
            flex: 1;
            background-color: var(--background-light);
            display: flex;
            justify-content: center;
            align-items: center;
            
        }

        .left-panel img {
            max-width: 100%;
            height: auto;
        }

        .right-panel {
            flex: 1;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            width: 100%;
            text-align: left;
            margin-bottom: 2rem;
        }

        .form-header h1 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }
        
        .form-header p {
            color: var(--text-light);
        }

        .form-switcher {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .form-switcher button,
        .form-switcher a { /* Apply shared styles to both button and link */
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            color: var(--text-light);
            padding: 1rem 0.5rem;
            margin-right: 1.5rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: color 0.3s, border-color 0.3s;
            text-decoration: none; /* Ensure link is not underlined */
        }

        .form-switcher button.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
        
        .form-switcher .icon {
            width: 18px;
            height: 18px;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .input-group .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--text-light);
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            background-color: var(--input-bg);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(42, 183, 167, 0.2);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: var(--text-light);
        }

        .remember-me input {
            margin-right: 0.5rem;
            accent-color: var(--primary-color);
        }

        .forgot-password a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .submit-button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-color);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        .submit-button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        @media (max-width: 992px) {
            .left-panel {
                display: none;
            }
            .right-panel {
                padding: 40px;
            }
            .main-container {
                width: 100%;
                max-width: 500px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">

        <div class="left-panel">
          <img src="{{ url_for('static', filename='images/login.png') }}" alt="Grocery Shopping App" style="border-radius: 10px;">
        </div>

        <div class="right-panel">
            <div class="form-header">
                <h1>Welcome Back!</h1>
                <p>Please enter your details to access your account.</p>
            </div>
            
            <div class="form-switcher">
                <button class="active">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 1a4.5 4.5 0 00-4.5 4.5V9H5a2 2 0 00-2 2v6a2 2 0 002 2h10a2 2 0 002-2v-6a2 2 0 00-2-2h-.5V5.5A4.5 4.5 0 0010 1zm3 8V5.5a3 3 0 10-6 0V9h6z" clip-rule="evenodd" />
                    </svg>
                    Login
                </button>
                <a href="{{ url_for('register') }}">Sign up</a>
            </div>

            <form method="POST">
                {% if error %}
                <p style="color: #ef4444; font-size: 0.9rem; margin-bottom: 1rem;">{{ error }}</p>
                {% endif %}

                <div class="input-group">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M3 4a2 2 0 00-2 2v1.161l8.441 4.221a1.25 1.25 0 001.118 0L19 7.162V6a2 2 0 00-2-2H3z" />
                        <path d="M19 8.839l-7.77 3.885a2.75 2.75 0 01-2.46 0L1 8.839V14a2 2 0 002 2h14a2 2 0 002-2V8.839z" />
                    </svg>
                    <input type="text" name="username" placeholder="Email or phone number" required>
                </div>
                
                <div class="input-group">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 1a4.5 4.5 0 00-4.5 4.5V9H5a2 2 0 00-2 2v6a2 2 0 002 2h10a2 2 0 002-2v-6a2 2 0 00-2-2h-.5V5.5A4.5 4.5 0 0010 1zm3 8V5.5a3 3 0 10-6 0V9h6z" clip-rule="evenodd" />
                    </svg>
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <div class="forgot-password">
                        <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
                    </div>
                </div>

                <button type="submit" class="submit-button">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
